spec: flatmachine
spec_version: "1.1.1"

data:
  name: cli-tool-loop
  profiles: ./profiles.yml

  context:
    task: "{{ input.task }}"
    working_dir: "{{ input.working_dir }}"
    human_approved: false

  agents:
    coder: ./agent.yml

  states:
    start:
      type: initial
      transitions:
        - to: work

    work:
      agent: coder
      tool_loop:
        max_turns: 30
        max_tool_calls: 100
        max_cost: 2.00
        tool_timeout: 60
        total_timeout: 600
      input:
        task: "{{ context.task }}"
      output_to_context:
        result: "{{ output.content }}"
      transitions:
        - to: human_review

    human_review:
      action: human_review
      transitions:
        - condition: "context.human_approved == true"
          to: done
        - to: work

    done:
      type: final
      output:
        result: "{{ context.result }}"

metadata:
  description: "CLI coding agent with tool loop and human-in-the-loop review"
  tags: ["tool-use", "cli", "human-in-loop"]
