spec: flatmachine
spec_version: "2.0.0"

data:
  name: dynamic-tool-machine
  profiles: ./profiles.yml

  context:
    task: "{{ input.task }}"

  agents:
    orchestrator: ./agent.yml

  states:
    start:
      type: initial
      transitions:
        - to: orchestrate

    orchestrate:
      agent: orchestrator
      tool_loop:
        max_turns: 10
        max_tool_calls: 10
        max_cost: 1.0
        tool_timeout: 30
        total_timeout: 120
      input:
        task: "{{ context.task }}"
      output_to_context:
        result: "{{ output.content }}"
      transitions:
        - to: done

    done:
      type: final
      output:
        result: "{{ context.result }}"

metadata:
  description: "Single-machine/single-agent dynamic tool loop with machine launch"
  tags: ["tool-loop", "discovery", "launch", "minimal"]
